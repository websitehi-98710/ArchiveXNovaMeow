<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meow</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e0ffe9, #b2f7d4, #80e8c2, #4dd0e1); /* gradasi hijau-biru segar */
      color: #000000;  
      min-height: 100vh;
      padding: 20px 15px;
      line-height: 1.5;
      background-attachment: fixed;
    }

    .container { max-width: 1200px; margin: 0 auto; }

    header { 
      text-align: center; 
      margin-bottom: 3rem; 
      padding: 2rem 0; 
      position: relative;
    }

    h1 {
      font-size: 3.8rem;
      font-weight: 900;
      background: linear-gradient(90deg, #00695c, #00897b, #00acc1, #26c6da); /* judul hijau-biru */
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% 100%;
      animation: neonShimmer 4s linear infinite;
      text-shadow: 
        0 0 15px #26c6da90,
        0 0 30px #00acc170,
        0 0 50px #00897b50;
      letter-spacing: 1.5px;
    }

    @keyframes neonShimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .subtitle { 
      font-size: 1.4rem; 
      color: #004d40; /* hijau tua */
      margin-top: 0.8rem; 
      text-shadow: 0 0 8px #ffffff60;
      letter-spacing: 0.8px;
    }

    .category {
      background: rgba(255, 255, 255, 0.75);  
      border-radius: 20px;
      padding: 2rem 2.2rem;
      margin-bottom: 3rem;
      backdrop-filter: blur(12px);
      border: 2px solid #4dd0e180;
      box-shadow: 
        0 12px 40px rgba(0,0,0,0.15),
        inset 0 0 20px rgba(255,255,255,0.5);
      position: relative;
      overflow: hidden;
    }

    .category h2 {
      font-size: 2.6rem;
      color: #00695c;
      margin-bottom: 1.8rem;
      border-bottom: 4px solid #00acc1;
      padding-bottom: 1rem;
      text-align: left;
      text-shadow: 0 0 12px #00acc160;
    }

    .game-list {
      display: block;
      list-style: none;
    }

    .game-item {
      background: rgba(255, 255, 255, 0.9);
      padding: 1.4rem 1.8rem;
      border-radius: 14px;
      border: 1.5px solid #80e8c2;
      transition: all 0.4s ease;
      font-size: 1.25rem;
      color: #000000;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      margin-bottom: 1.2rem;
      position: relative;
      overflow: hidden;
    }

    .game-item::after {
      content: '';
      position: absolute;
      top: -100%;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(transparent, rgba(77, 208, 225, 0.2), transparent);
      transition: all 0.7s ease;
      pointer-events: none;
    }

    .game-item:hover {
      transform: translateY(-6px);
      border-color: #00695c;
      box-shadow: 0 15px 40px rgba(0, 172, 193, 0.3);
    }

    .game-item:hover::after {
      top: 100%;
    }

    footer {
      text-align: center;
      margin-top: 5rem;
      padding: 2rem 0;
      color: #004d40;
      font-size: 1.1rem;
      border-top: 2px solid #80e8c260;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.8rem; }
      .category { padding: 1.6rem; }
      .category h2 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <div class="container">

    <header>
      <h1>ArchiveXNova</h1>
      <div class="subtitle"></div>
    </header>

    <div id="categoriesContainer"></div>

    <footer>
      
    </footer>

  </div>

  <script>
    const categories = {
      "": [
        "Game > ",
        "Date Created > ",
        "Tested Feature > Feature has been tested",
        "Feature > The Feature still works if the game is updated please report to Nova",
        "Made By > ArchiveXNova",
        "Credit By > ArchiveXNova",
      ]
    };

    function renderAllCategories() {
      const container = document.getElementById("categoriesContainer");
      container.innerHTML = '';

      Object.keys(categories).forEach(catName => {
        const section = document.createElement("section");
        section.className = "category";

        if (catName.trim() !== "") {
          const h2 = document.createElement("h2");
          h2.textContent = catName + ":";
          section.appendChild(h2);
        }

        const ul = document.createElement("ul");
        ul.className = "game-list";

        categories[catName].forEach(item => {
          const li = document.createElement("li");
          li.className = "game-item";
          li.textContent = item.trim();
          ul.appendChild(li);
        });

        section.appendChild(ul);
        container.appendChild(section);
      });
    }

    renderAllCategories();
  </script>

</body>
</html>
